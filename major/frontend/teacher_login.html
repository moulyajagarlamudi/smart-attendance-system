<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Portal Login</title>
<link rel="stylesheet" href="teacher_login.css" />
</head>
<body>
<div class="logo-container">
    <img src="https://www.vvitu.ac.in/src/assets/images/VVIT_logo.png" alt="VVIT University Logo">
</div>

<div class="container">
    <div class="right-panel animate-card">
        <!-- LOGIN FORM -->
        <div id="loginBox">
            <h2>Teacher Login</h2>
            <form id="loginForm">
                <label for="teacherId">Teacher ID</label>
                <input type="text" id="teacherId" name="teacherId" placeholder="Enter your Teacher ID" required />

                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Password" required />
                    <span class="toggle-password" onclick="togglePassword()">👁</span>
                </div>

                <div class="form-options">
                    <a href="#" class="forgot" id="forgotLink">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <!-- Register Link -->
            <p class="register-text">
                Don’t have an account? 
                <a href="teacher_register.html" class="register-link">Register here</a>
            </p>

            <div id="message"></div>
        </div>

        <!-- FORGOT PASSWORD FORM -->
        <div id="forgotForm" style="display:none;">
            <h2>Reset Password</h2>
            <form id="forgotPasswordForm">
                <input type="email" id="resetEmail" name="resetEmail" placeholder="Enter your registered email" required />
                <button type="submit" class="login-btn">Send Reset Link</button>
            </form>
            <div id="forgotMsg"></div>
            <div style="text-align:center; margin-top:10px;">
                <a href="#" id="backToLogin" class="forgot">Back to Login</a>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passInput = document.getElementById("password");
    passInput.type = passInput.type === "password" ? "text" : "password";
}

const msg = document.getElementById("message");

// LOGIN FORM SUBMIT
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    msg.className = "";
    const teacherId = document.getElementById('teacherId').value.trim();
    const password = document.getElementById('password').value;

    try {
        const res = await fetch("http://127.0.0.1:8000/login-teacher", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ teacher_id: teacherId, password: password })
        });

        const data = await res.json();
        if (res.ok && data.success) {
            msg.className = "success";
            msg.innerText = data.message || "Login successful";

            localStorage.setItem("teacherId", data.teacher.teacherId);
            localStorage.setItem("teacherName", data.teacher.name);
            localStorage.setItem("teacherEmail", data.teacher.email);

            setTimeout(() => window.location.href = 'teacher_dashboard.html', 700);
        } else {
            msg.className = "error";
            msg.innerText = data.message || data.detail || JSON.stringify(data);
        }
    } catch (err) {
        msg.className = "error";
        msg.innerText = "Network error. Check backend.";
        console.error(err);
    }
});

// SHOW FORGOT PASSWORD FORM
document.getElementById("forgotLink").addEventListener("click", function(e) {
    e.preventDefault();
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("forgotForm").style.display = "block";
    document.getElementById("forgotMsg").innerText = "";
    document.getElementById("resetEmail").value = "";
});

// BACK TO LOGIN
document.getElementById("backToLogin").addEventListener("click", function(e) {
    e.preventDefault();
    document.getElementById("forgotForm").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
});

// FORGOT PASSWORD SUBMIT
document.getElementById("forgotPasswordForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const forgotMsg = document.getElementById("forgotMsg");
    forgotMsg.className = "";
    forgotMsg.innerText = "";
    const email = document.getElementById("resetEmail").value.trim();

    try {
        const res = await fetch("http://127.0.0.1:8000/forgot-password-teacher", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email })
        });
        const data = await res.json();
        if (res.ok && data.success) {
            forgotMsg.className = "success";
            forgotMsg.innerText = data.message || "Password reset link sent to your email.";
        } else {
            forgotMsg.className = "error";
            forgotMsg.innerText = data.detail || data.message || "Failed to send reset link.";
        }
    } catch (err) {
        forgotMsg.className = "error";
        forgotMsg.innerText = "Network error. Please try again.";
        console.error(err);
    }
});
</script>
</body>
</html>
