<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Registration</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f4fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1d3557;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .register-btn {
            width: 100%;
            padding: 12px;
            background-color: #1d72b8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .register-btn:hover {
            background-color: #145a8d;
        }
        .login-link {
            text-align: center;
            margin-top: 15px;
        }
        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .error { color: crimson; font-weight: 600; margin-top: 6px; text-align:center; }
        .success { color: green; font-weight: 600; margin-top: 6px; text-align:center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Registration</h2>
        <form id="registerForm">
            <label for="rollno">ROLL NO</label>
            <input type="text" id="rollno" name="rollno" placeholder="Enter your Roll No" required>

            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your Full Name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your Email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required>

            <button type="submit" class="register-btn">Register</button>
        </form>
        <div id="message" class=""></div>
        <div class="login-link">
            <span>Already have an account? <a href="student_login.html">Login</a></span>
        </div>
    </div>

<script>
const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

document.getElementById("registerForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const roll = document.getElementById("rollno").value.trim();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const msg = document.getElementById("message");
    msg.className = "";

    if (!passwordRegex.test(password)) {
        msg.className = "error";
        msg.innerText = "Password must be 8+ chars, include uppercase, lowercase, digit and symbol.";
        return;
    }

    try {
        const res = await fetch("http://127.0.0.1:8000/register-student", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ roll: roll, name: name, email: email, password: password })
        });

        const data = await res.json();
        if (res.ok && data.success) {
            msg.className = "success";
            msg.innerText = data.message || "Registered successfully.";
            setTimeout(()=> window.location.href = "student_login.html", 1200);
        } else {
            msg.className = "error";
            msg.innerText = data.detail || data.message || "Registration failed.";
        }
    } catch (err) {
        msg.className = "error";
        msg.innerText = "Network error. Check backend.";
        console.error(err);
    }
});
</script>
</body>
</html>
